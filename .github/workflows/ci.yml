name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: Git ref to verify when CI is called by another workflow.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend test and package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Run backend tests
        run: |
          chmod +x mvnw
          ./mvnw -B test

      - name: Package backend
        run: ./mvnw -B -DskipTests package

      - name: Upload backend test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports
          if-no-files-found: ignore

  frontend:
    name: Frontend type check and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8080
      INTERNAL_API_BASE_URL: http://127.0.0.1:8080
      SITE_URL: https://ci.invalid
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Build frontend
        run: pnpm build
