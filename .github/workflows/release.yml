name: Publish release images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing Git tag to build and publish, for example v1.0.0
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

env:
  BACKEND_IMAGE: ghcr.io/spring0w0/newblog-backend
  FRONTEND_IMAGE: ghcr.io/spring0w0/newblog-frontend
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
  PRODUCTION_API_BASE_URL: ${{ vars.PRODUCTION_API_BASE_URL }}
  PRODUCTION_SITE_URL: ${{ vars.PRODUCTION_SITE_URL }}

jobs:
  verify:
    name: Verify tagged source
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ inputs.release_tag || github.ref }}

  publish:
    name: Build and publish images
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Validate release inputs
        shell: bash
        run: |
          [[ "${RELEASE_TAG}" =~ ^v[0-9]+(\.[0-9]+){0,2}([-.][0-9A-Za-z.-]+)?$ ]]
          [[ "${PRODUCTION_SITE_URL}" =~ ^https:// ]]
          [[ "${PRODUCTION_API_BASE_URL}" =~ ^https:// ]]

      - name: Ensure release tag is based on master
        shell: bash
        run: |
          git fetch origin master --depth=1
          git merge-base --is-ancestor HEAD origin/master

      - name: Resolve release revision
        id: revision
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ env.RELEASE_TAG }}
            ${{ env.BACKEND_IMAGE }}:sha-${{ steps.revision.outputs.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.revision.outputs.sha }}
            org.opencontainers.image.version=${{ env.RELEASE_TAG }}
          cache-from: type=gha,scope=backend-image
          cache-to: type=gha,mode=max,scope=backend-image

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ env.PRODUCTION_API_BASE_URL }}
            SITE_URL=${{ env.PRODUCTION_SITE_URL }}
            INTERNAL_API_BASE_URL=http://127.0.0.1:8080
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ env.RELEASE_TAG }}
            ${{ env.FRONTEND_IMAGE }}:sha-${{ steps.revision.outputs.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.revision.outputs.sha }}
            org.opencontainers.image.version=${{ env.RELEASE_TAG }}
          cache-from: type=gha,scope=frontend-image
          cache-to: type=gha,mode=max,scope=frontend-image
