name: Deploy production

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Published release tag to deploy, for example v1.0.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ inputs.release_tag }}
  PRODUCTION_SITE_URL: ${{ vars.PRODUCTION_SITE_URL }}
  DEPLOY_HOST: ${{ vars.PRODUCTION_DEPLOY_HOST }}
  DEPLOY_PORT: ${{ vars.PRODUCTION_DEPLOY_PORT || '22' }}
  DEPLOY_USER: ${{ vars.PRODUCTION_DEPLOY_USER }}
  DEPLOY_PATH: /srv/newblog

jobs:
  deploy:
    name: Deploy tagged release
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_SITE_URL }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate deployment inputs
        shell: bash
        run: |
          [[ "${RELEASE_TAG}" =~ ^v[0-9]+(\.[0-9]+){0,2}([-.][0-9A-Za-z.-]+)?$ ]]
          [[ "${PRODUCTION_SITE_URL}" =~ ^https:// ]]
          test -n "${DEPLOY_HOST}"
          test -n "${DEPLOY_USER}"

      - name: Configure SSH client
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${DEPLOY_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload deployment definitions
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${DEPLOY_PORT}" -o BatchMode=yes -o ConnectTimeout=15 "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p ${DEPLOY_PATH}"
          scp -i ~/.ssh/id_ed25519 -P "${DEPLOY_PORT}" -o BatchMode=yes -r compose.prod.yaml deploy "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Run remote deployment and rollback on failure
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${DEPLOY_PORT}" -o BatchMode=yes -o ConnectTimeout=15 "${DEPLOY_USER}@${DEPLOY_HOST}" "chmod 700 ${DEPLOY_PATH}/deploy/scripts/*.sh && cd ${DEPLOY_PATH} && RELEASE_TAG='${RELEASE_TAG}' ./deploy/scripts/deploy.sh"

      - name: Verify publicly reachable site
        run: bash deploy/scripts/verify-public.sh "${PRODUCTION_SITE_URL}"
