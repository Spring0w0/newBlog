spring:
  application:
    name: backend
  profiles:
    active: dev

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  security:
    jwt:
      access-token-expiration: PT2H
      issuer: newblog
  cors:
    allowed-origins: http://localhost:3000
  upload:
    root-dir: ${UPLOAD_ROOT_DIR:uploads}
    public-path: /images
    max-file-size: 10MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      id-type: auto

springdoc:
  api-docs:
    path: /v3/api-docs
  packages-to-scan: com.spring0w0.backend.controller
  paths-to-match: /api/**
  swagger-ui:
    path: /swagger
    operations-sorter: alpha
    tags-sorter: alpha
