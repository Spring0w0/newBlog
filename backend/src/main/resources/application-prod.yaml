spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cache:
    type: caffeine
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  upload:
    root-dir: ${UPLOAD_ROOT_DIR:/data/newblog/uploads}
    public-path: /images
    public-base-url: ${PUBLIC_BASE_URL:http://www.spring0w04j.top}
    max-file-size: 10MB
